input {
  beats {
    port => 5044
  }
}

filter {
  if [message] =~ "^{.*}$" {
    json {
      source => "message"
    }
  }

  mutate {
    add_field => { "service" => "%{[fields][service]}" }
  }

  date {
    match => [ "timestamp", "ISO8601" ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
  }
  
  stdout { codec => rubydebug }
}