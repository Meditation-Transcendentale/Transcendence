version: "3.8"

services:
  elasticsearch:
    image: elasticsearch:8.6.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      # - /home/efayolle/Documents/Transcendence/Transcendence/elk/elasticsearch/data:/usr/share/elasticsearch/data
      # - /home/efayolle/Documents/Transcendence/Transcendence/elk/elasticsearch/logs:/usr/share/elasticsearch/logs
      - /home/efayolle/Documents/Transcendence/Transcendence/elk/elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    ports:
      - "9200:9200"
    networks:
      - logging

  logstash:
    image: logstash:8.6.2
    container_name: logstash
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - /home/efayolle/Documents/Transcendence/Transcendence/elk/logstash/pipeline:/usr/share/logstash/pipeline
      - /home/efayolle/Documents/Transcendence/Transcendence/elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - /home/efayolle/Documents/Transcendence/Transcendence/elk/logstash/logs:/usr/share/logstash/logs
    ports:
      - "5044:5044"
      - "9600:9600"
    networks:
      - logging
    depends_on:
      - elasticsearch

  kibana:
    image: kibana:8.6.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - /home/efayolle/Documents/Transcendence/Transcendence/elk/kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml
      - /home/efayolle/Documents/Transcendence/Transcendence/elk/kibana/logs:/usr/share/kibana/logs
    ports:
      - "5601:5601"
    networks:
      - logging
    depends_on:
      - elasticsearch

  filebeat:
    image: elastic/filebeat:8.6.2
    container_name: filebeat
    volumes:
      - /home/efayolle/Documents/Transcendence/Transcendence/elk/filebeat/config/filebeat.yml:/filebeat/config/filebeat.yml
      - /home/efayolle/Documents/Transcendence/Transcendence/elk/filebeat/logs:/filebeat/logs
      - /home/efayolle/goinfre/docker/containers:/goinfre/docker/containers:ro
    networks:
      - logging
    depends_on:
      - logstash

networks:
  logging:
    driver: bridge