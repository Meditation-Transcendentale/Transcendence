version: "3.8"

services:
  elasticsearch:
    image: elasticsearch:8.6.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - ./elasticsearch/data:/elasticsearch/data
      - ./elasticsearch/logs:/elasticsearch/logs
      - ./elasticsearch/config/elasticsearch.yml:/elasticsearch/config/elasticsearch.yml
    ports:
      - "9200:9200"
    networks:
      - logging

  logstash:
    image: logstash:8.6.2
    container_name: logstash
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - ./logstash/pipeline:/logstash/pipeline
      - ./logstash/config/logstash.yml:/logstash/config/logstash.yml
      - ./logstash/logs:/logstash/logs
    ports:
      - "5044:5044"
      - "9600:9600"
    networks:
      - logging
    depends_on:
      - elasticsearch

  kibana:
    image: kibana:8.6.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - ./kibana/config/kibana.yml:/kibana/config/kibana.yml
      - ./kibana/logs:/kibana/logs
    ports:
      - "5601:5601"
    networks:
      - logging
    depends_on:
      - elasticsearch

  filebeat:
    image: elastic/filebeat:8.6.2
    container_name: filebeat
    volumes:
      - ./filebeat/config/filebeat.yml:/filebeat/config/filebeat.yml
      - ./filebeat/logs:/filebeat/logs
      - /goinfre/docker/containers:/goinfre/docker/containers:ro
    networks:
      - logging
    depends_on:
      - logstash

networks:
  logging:
    driver: bridge